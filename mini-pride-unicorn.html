<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Glimmerstien - Et interaktivt Mini Pride-verk</title>
<link rel="icon" href="assets/logo.png" type="image/png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,400&family=IBM+Plex+Sans:wght@400;500;600;700&family=Baloo+2:wght@600;700&display=swap" rel="stylesheet" />
<style>
:root {
  --sky-top:    #ffe4cc;
  --sky-mid:    #fff5ea;
  --sky-low:    #f0ffe0;
  --grass:      #c8f0a0;
  --leaf:       #52aa60;
  --pond:       #76d4ea;
  --sun:        #ffa840;
  --coral:      #ff6e6e;
  --berry:      #e0508a;
  --violet:     #9b68cc;
  --gold:       #f0b040;
  --ink:        #0e2c35;
  --muted:      #3a5c68;
  --card:       rgba(255,255,255,0.84);
  --card-s:     rgba(255,255,255,0.94);
  --line:       rgba(14,44,53,0.10);
  --shadow:     0 20px 56px rgba(14,44,53,0.16);

  --safe-top:    env(safe-area-inset-top,    0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left:   env(safe-area-inset-left,   0px);
  --safe-right:  env(safe-area-inset-right,  0px);
  --app-h:       100dvh;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { overflow-x: hidden; scroll-behavior: smooth; }

body {
  font-family: "IBM Plex Sans", system-ui, sans-serif;
  background:
    radial-gradient(circle at 8%  8%,  rgba(255,168,64, 0.22), transparent 28%),
    radial-gradient(circle at 92% 12%, rgba(118,212,234,0.24), transparent 26%),
    radial-gradient(circle at 68% 92%, rgba(224,80,138, 0.14), transparent 26%),
    linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 48%, var(--sky-low) 100%);
  color: var(--ink);
  min-height: 100svh;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-text-size-adjust: 100%;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: -1;
  background:
    radial-gradient(circle at 50% 20%, rgba(255,255,255,0.28), transparent 30%),
    radial-gradient(circle at 20% 80%, rgba(255,110,110,0.12), transparent 32%),
    radial-gradient(circle at 80% 70%, rgba(110,184,242,0.14), transparent 32%);
}

body.large-type     { font-size: 1.1rem; }
body.high-contrast  {
  --ink: #041820; --muted: #163040; --card: rgba(255,255,255,0.96);
  --sky-top: #fff8e8; --sky-mid: #ffffff; --sky-low: #f8ffe0;
}
body.reduced-motion *, body.reduced-motion *::before, body.reduced-motion *::after {
  animation-duration: 0.001ms !important;
  transition-duration: 0.001ms !important;
}

button, input { font: inherit; }
button:focus-visible, input:focus-visible, canvas:focus-visible {
  outline: 3px solid rgba(224,80,138,0.58);
  outline-offset: 2px;
}

/* LAYOUT */
.page-shell {
  width: min(1440px, 100%);
  margin: 0 auto;
  padding:
    max(18px, var(--safe-top))
    clamp(14px, 3vw, 28px)
    max(24px, calc(var(--safe-bottom) + 18px));
  display: grid;
  grid-template-columns: minmax(330px, 400px) minmax(0, 1fr);
  gap: clamp(14px, 2.5vw, 22px);
  align-items: start;
}

/* PANELS */
.panel {
  border: 1px solid var(--line);
  border-radius: 28px;
  background: var(--card);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  box-shadow: var(--shadow);
  overflow: hidden;
}

/* INTRO PANEL */
.intro-panel {
  padding: 22px 22px 20px;
  display: grid;
  gap: 16px;
  align-content: start;
  position: sticky;
  top: max(14px, var(--safe-top));
  min-width: 0;
  overflow: visible;
}

.eyebrow-badge {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 7px 12px;
  border-radius: 999px;
  border: 1px solid rgba(14,44,53,0.10);
  background: rgba(255,255,255,0.72);
  font-size: 0.74rem;
  font-weight: 700;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--berry);
  width: fit-content;
}

.top-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr);
  align-items: start;
  gap: 10px;
  min-width: 0;
}
.top-row-titles {
  width: 100%;
  min-width: 0;
}

.main-title {
  font-family: "Fraunces", serif;
  font-size: clamp(1.9rem, 3.8vw, 3.4rem);
  font-weight: 300;
  line-height: 0.94;
  color: var(--ink);
  margin-bottom: 5px;
  max-width: 100%;
  overflow-wrap: break-word;
}

.sub-tagline {
  font-size: 0.72rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  opacity: 0.7;
  max-width: 28ch;
  overflow-wrap: anywhere;
}

.ctrl-buttons {
  display: flex;
  flex-direction: row;
  flex-wrap: wrap;
  gap: 6px;
  width: 100%;
  min-width: 0;
  justify-content: flex-start;
}

.pill-btn {
  border: 1px solid rgba(14,44,53,0.13);
  background: var(--card-s);
  color: var(--ink);
  border-radius: 999px;
  padding: 9px 13px;
  font-weight: 700;
  font-size: 0.78rem;
  cursor: pointer;
  transition: transform 140ms ease, box-shadow 140ms ease, border-color 140ms ease;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  white-space: nowrap;
  min-height: 38px;
}
.pill-btn:hover {
  transform: translateY(-1px);
  border-color: rgba(224,80,138,0.30);
  box-shadow: 0 10px 22px rgba(224,80,138,0.13);
}
.mobile-info-toggle { display: none; }

.lede {
  font-size: clamp(0.84rem, 2.2vw, 0.94rem);
  line-height: 1.62;
  color: var(--muted);
  max-width: 42ch;
  overflow-wrap: anywhere;
  hyphens: auto;
}
.museum-label {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
}
.museum-label span {
  padding: 6px 9px;
  border-radius: 999px;
  background: rgba(255,255,255,0.62);
  border: 1px solid var(--line);
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
}

/* BADGE SHELF */
.badge-shelf {
  background: rgba(255,255,255,0.52);
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 14px 16px;
}
.badge-shelf-title {
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--berry);
  margin-bottom: 10px;
  display: block;
}
.badge-row { display: flex; gap: 8px; flex-wrap: wrap; }
.badge-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  width: calc(16.666% - 7px); min-width: 38px;
}
.badge-icon {
  font-size: 1.5rem; line-height: 1;
  opacity: 0.26;
  transition: opacity 300ms ease, transform 300ms ease, filter 300ms ease;
  filter: grayscale(1);
}
.badge-icon.unlocked { opacity: 1; filter: none; transform: scale(1.1); }
.badge-label { font-size: 0.58rem; color: var(--muted); text-align: center; opacity: 0.6; line-height: 1.2; }

/* PROGRESS */
.progress-card {
  padding: 14px 16px;
  border-radius: 20px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,0.60);
}
.progress-kicker {
  display: block; font-size: 0.72rem; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--berry); margin-bottom: 8px;
}
.progress-line { display: flex; justify-content: space-between; align-items: flex-end; gap: 10px; margin-bottom: 8px; }
.progress-num { font-size: 1.9rem; font-family: "Baloo 2", cursive; line-height: 1; color: var(--ink); }
.progress-note { font-size: 0.78rem; color: var(--muted); text-align: right; flex: 1; line-height: 1.4; }
.progress-track { height: 10px; border-radius: 999px; overflow: hidden; background: rgba(14,44,53,0.07); }
.progress-fill {
  height: 100%; width: 0%; border-radius: inherit;
  background: linear-gradient(90deg, var(--coral), var(--gold), #7ad9ff, var(--violet));
  transition: width 280ms cubic-bezier(.4,0,.2,1);
}

/* NEXT STOP */
.next-stop-chip {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 13px; border-radius: 999px;
  border: 1px solid var(--line); background: rgba(255,255,255,0.68);
  font-size: 0.8rem; font-weight: 600; color: var(--ink);
}

/* SETTINGS */
.settings-section { display: grid; gap: 8px; }
.settings-section-title {
  font-size: 0.72rem; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--muted); opacity: 0.7;
}
.setting-chip {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 16px;
  border: 1px solid var(--line); background: rgba(255,255,255,0.56);
  cursor: pointer; font-size: 0.82rem; line-height: 1.4;
  min-height: 44px; touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.setting-chip input { width: 17px; height: 17px; accent-color: var(--berry); flex-shrink: 0; }

/* STAGE PANEL */
.stage-panel { position: relative; padding: 18px; display: grid; gap: 14px; }
.stage-top { display: flex; justify-content: space-between; gap: 14px; align-items: flex-start; }
.stage-copy { display: grid; gap: 6px; }
.stage-kicker { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--berry); }
.stage-title { font-family: "Fraunces", serif; font-size: clamp(1.2rem, 2.8vw, 1.8rem); font-weight: 600; line-height: 1.05; color: var(--ink); }
.stage-text { font-size: 0.88rem; line-height: 1.6; color: var(--muted); }
.stage-text { max-width: 70ch; white-space: pre-line; overflow-wrap: anywhere; }

/* CANVAS */
.canvas-wrap {
  position: relative; border-radius: 26px; overflow: hidden;
  border: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(255,240,220,0.92) 0%, rgba(220,248,192,0.92) 100%);
  box-shadow: 0 12px 40px rgba(14,44,53,0.12);
}
canvas#stage {
  display: block; width: 100%; height: auto; aspect-ratio: 1200 / 760;
  cursor: pointer; touch-action: none; -webkit-tap-highlight-color: transparent;
}

/* MEMORY CARD */
.memory-card {
  position: absolute; inset: 0; z-index: 20;
  display: flex; align-items: center; justify-content: center;
  background: rgba(10,20,30,0.68);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  padding: 20px; animation: fadeIn 220ms ease;
}
.memory-card[hidden] { display: none; }
.memory-card-inner {
  width: min(400px, 100%); background: var(--card-s);
  border-radius: 24px; padding: 24px 22px 20px;
  box-shadow: 0 28px 80px rgba(0,0,0,0.28);
  display: grid; gap: 12px; text-align: center;
}
.memory-badge { font-size: 3.2rem; line-height: 1; }
.memory-title { font-family: "Fraunces", serif; font-size: 1.3rem; font-weight: 600; color: var(--ink); }
.memory-text-child { font-size: 0.9rem; line-height: 1.58; color: var(--ink); }
.memory-text-family {
  font-size: 0.82rem; line-height: 1.6; color: var(--muted); font-style: italic;
  border-top: 1px solid var(--line); padding-top: 10px;
}
.memory-actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.memory-btn {
  border-radius: 999px; padding: 11px 18px;
  font-weight: 700; font-size: 0.84rem; cursor: pointer;
  border: 1px solid var(--line); background: var(--card-s); color: var(--ink);
  transition: background 150ms ease, border-color 140ms ease, transform 140ms ease;
  touch-action: manipulation; -webkit-tap-highlight-color: transparent; min-height: 44px;
}
.memory-btn.primary { background: var(--berry); color: #fff; border-color: var(--berry); }
.memory-btn.primary:hover { background: #c43a72; transform: translateY(-1px); }
.memory-btn:hover { background: rgba(14,44,53,0.06); transform: translateY(-1px); }

/* TOUCH PAD */
.touch-pad { display: none; gap: 8px; grid-template-columns: repeat(3, minmax(0, 64px)); justify-content: center; }
.touch-btn {
  min-height: 56px; border-radius: 20px; border: 1px solid var(--line);
  background: var(--card-s); color: var(--ink); font-size: 1.3rem; font-weight: 700;
  cursor: pointer; touch-action: none; -webkit-tap-highlight-color: transparent;
  transition: background 100ms ease, transform 100ms ease; user-select: none;
}
.touch-btn:active { background: rgba(14,44,53,0.08); transform: scale(0.93); }
.touch-btn.blank { visibility: hidden; }

/* CELEBRATION */
#celebration-layer { position: absolute; inset: 0; z-index: 15; pointer-events: none; overflow: hidden; border-radius: inherit; }

/* FOOTER */
.footer-strip {
  grid-column: 1 / -1; padding: 16px 20px;
  display: flex; justify-content: space-between; gap: 14px;
  align-items: flex-start; flex-wrap: wrap;
}
.footer-note { font-size: 0.8rem; line-height: 1.6; color: var(--muted); flex: 1 1 280px; }
.access-note { font-size: 0.76rem; color: var(--muted); opacity: 0.72; line-height: 1.55; flex: 1 1 200px; }

/* HAPTIC FALLBACK */
.haptic-pulse-overlay {
  position: fixed; inset: 0; pointer-events: none; z-index: 99999;
  background: radial-gradient(circle at center, rgba(200,255,220,0.18) 0%, rgba(118,212,234,0.10) 36%, rgba(0,0,0,0) 72%);
  opacity: 0;
}
.haptic-pulse-overlay.active { animation: hapticPulse 200ms ease-out forwards; }
@keyframes hapticPulse { 0% { opacity: 0; } 30% { opacity: 1; } 100% { opacity: 0; } }

/* BADGE POP */
.badge-pop {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0.4);
  background: var(--card-s); border-radius: 28px; padding: 28px 32px;
  text-align: center; box-shadow: 0 32px 100px rgba(0,0,0,0.28);
  z-index: 9999; opacity: 0; pointer-events: none;
  transition: transform 380ms cubic-bezier(.175,.885,.32,1.5), opacity 240ms ease;
}
.badge-pop.show { opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: auto; }
.badge-pop-icon  { font-size: 4rem; line-height: 1; margin-bottom: 10px; }
.badge-pop-title { font-family: "Fraunces", serif; font-size: 1.4rem; font-weight: 600; margin-bottom: 6px; color: var(--ink); }
.badge-pop-text  { font-size: 0.86rem; color: var(--muted); line-height: 1.55; max-width: 22ch; margin: 0 auto 16px; }
.badge-pop-close {
  border: 1px solid var(--line); background: var(--card-s); color: var(--berry);
  border-radius: 999px; padding: 10px 22px; font-weight: 700; font-size: 0.84rem;
  cursor: pointer; touch-action: manipulation; -webkit-tap-highlight-color: transparent; min-height: 44px;
}

/* FINALE */
#finale-overlay {
  position: fixed; inset: 0; z-index: 500;
  background:
    radial-gradient(circle at 50% 25%, rgba(255,220,130,0.34), transparent 28%),
    radial-gradient(circle at 20% 80%, rgba(224,80,138,0.24), transparent 30%),
    radial-gradient(circle at 80% 70%, rgba(110,184,242,0.26), transparent 32%),
    rgba(14,44,53,0.82);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  padding: max(20px, var(--safe-top)) 20px max(20px, var(--safe-bottom));
  opacity: 0; pointer-events: none; transition: opacity 600ms ease;
}
#finale-overlay.show { opacity: 1; pointer-events: auto; }
.finale-card {
  width: min(560px, 100%);
  border: 1px solid rgba(255,255,255,0.42);
  background:
    linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,248,238,0.92));
  border-radius: 32px;
  padding: 36px 32px 28px; text-align: center; display: grid; gap: 18px;
  box-shadow: 0 40px 120px rgba(0,0,0,0.36); max-height: calc(100dvh - 40px); overflow-y: auto;
}
.finale-logo-wrap {
  position: relative;
  width: clamp(90px, 28vw, 140px);
  margin: 0 auto 4px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.finale-logo {
  width: 100%;
  height: auto;
  position: relative;
  z-index: 2;
  filter: drop-shadow(0 0 18px rgba(255,180,220,0.55)) drop-shadow(0 0 6px rgba(255,120,200,0.4));
  animation: finaleLogoPulse 2.8s ease-in-out infinite;
}
.finale-logo-glow {
  position: absolute;
  inset: -20%;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,200,240,0.38) 0%, rgba(180,130,255,0.2) 45%, transparent 70%);
  z-index: 1;
  animation: finaleGlowPulse 2.8s ease-in-out infinite;
}
@keyframes finaleLogoPulse {
  0%, 100% { transform: scale(1); filter: drop-shadow(0 0 18px rgba(255,180,220,0.55)) drop-shadow(0 0 6px rgba(255,120,200,0.4)); }
  50% { transform: scale(1.06); filter: drop-shadow(0 0 28px rgba(255,200,240,0.80)) drop-shadow(0 0 12px rgba(200,100,255,0.6)); }
}
@keyframes finaleGlowPulse {
  0%, 100% { opacity: 0.7; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.12); }
}
.finale-title { font-family: "Fraunces", serif; font-size: clamp(1.4rem, 3.5vw, 2.2rem); font-weight: 600; color: var(--ink); line-height: 1.1; }
.finale-poem { font-family: "Fraunces", serif; font-style: italic; font-size: clamp(0.9rem, 2.2vw, 1.05rem); line-height: 1.7; color: var(--muted); max-width: 34ch; margin: 0 auto; white-space: pre-line; }
.finale-badges { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; font-size: 2.4rem; }
.finale-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.finale-btn {
  border-radius: 999px; padding: 13px 24px; font-weight: 700; font-size: 0.9rem;
  cursor: pointer; border: 1px solid var(--line); background: var(--card-s); color: var(--ink);
  transition: background 140ms ease, transform 140ms ease; min-height: 48px;
  touch-action: manipulation; -webkit-tap-highlight-color: transparent;
}
.finale-btn.primary { background: linear-gradient(135deg, var(--berry), var(--violet)); color: #fff; border-color: transparent; }
.finale-btn.primary:hover { transform: translateY(-2px); filter: brightness(1.08); }
.finale-btn:hover { background: rgba(14,44,53,0.06); transform: translateY(-1px); }

/* ANIMATIONS */
@keyframes fadeIn    { from { opacity: 0; } to { opacity: 1; } }
@keyframes confettiFall { 0% { transform: translateY(-10px) rotate(0deg); opacity: 1; } 100% { transform: translateY(120px) rotate(360deg); opacity: 0; } }

/* RESPONSIVE */
@media (max-width: 980px) {
  .page-shell { grid-template-columns: 1fr; }
  .intro-panel { position: static; }
  .footer-strip { flex-direction: column; }
}
@media (pointer: coarse), (max-width: 760px) {
  .touch-pad { display: grid; }
  .stage-top { flex-direction: column; }
}
@media (max-width: 760px) {
  body {
    overflow-x: hidden;
    overflow-y: auto;
    min-height: 100dvh;
  }

  .page-shell {
    width: 100vw;
    height: auto;
    min-height: 100dvh;
    padding: max(10px, var(--safe-top)) 10px max(10px, var(--safe-bottom));
    display: grid;
    grid-template-columns: 1fr;
    grid-template-rows: 1fr;
    gap: 10px;
    align-items: stretch;
    overflow: visible;
  }

  .stage-panel {
    order: 1;
    height: auto;
    min-height: 0;
    padding: 10px;
    border-radius: 24px;
    display: grid;
    grid-template-rows: auto minmax(260px, 1fr) auto;
    overflow: visible;
  }

  .intro-panel {
    order: 2;
    position: relative;
    left: auto;
    right: auto;
    bottom: auto;
    z-index: 20;
    max-height: none;
    overflow: visible;
    padding: 14px;
    border-radius: 24px;
    gap: 10px;
    margin-top: 8px;
  }

  .footer-strip {
    display: none;
  }

  .mobile-info-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .intro-panel.mobile-collapsed {
    max-height: 74px;
    overflow: hidden;
    padding: 10px 12px;
  }

  .intro-panel.mobile-collapsed .eyebrow-badge,
  .intro-panel.mobile-collapsed .sub-tagline,
  .intro-panel.mobile-collapsed .lede,
  .intro-panel.mobile-collapsed .museum-label,
  .intro-panel.mobile-collapsed .badge-shelf,
  .intro-panel.mobile-collapsed .settings-section,
  .intro-panel.mobile-collapsed #reset-btn {
    display: none;
  }

  .intro-panel.mobile-collapsed .top-row {
    align-items: center;
    gap: 8px;
  }

  .intro-panel.mobile-collapsed .main-title {
    font-size: 1.16rem;
    line-height: 1;
    margin: 0;
  }

  .intro-panel.mobile-collapsed .ctrl-buttons {
    flex-direction: row;
    gap: 6px;
  }

  .intro-panel.mobile-collapsed .pill-btn {
    min-height: 34px;
    padding: 7px 10px;
    font-size: 0.72rem;
  }

  .intro-panel.mobile-collapsed .progress-card {
    position: absolute;
    left: 12px;
    right: 116px;
    top: 38px;
    padding: 0;

function loadSettings() {
  try { return { ...DEFAULT_SETTINGS, ...JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}') }; }
  catch { return { ...DEFAULT_SETTINGS }; }
}
function loadProgress() {
  try {
    const p = JSON.parse(localStorage.getItem(PROGRESS_KEY) || '[]');
    return Array.isArray(p) ? p.filter(id => STOPS.some(s => s.id === id)) : [];
  } catch { return []; }
}
function saveSettings() { localStorage.setItem(SETTINGS_KEY, JSON.stringify(state.settings)); }
function saveProgress() { localStorage.setItem(PROGRESS_KEY, JSON.stringify([...state.found])); }
function copy() { return COPY[state.lang]; }
function stopCopy(id) { return copy().stops[id]; }
function nextStop() { return STOPS.find(s => !state.found.has(s.id)) || null; }

// --- HAPTIC ---
const supportsVibrate = typeof navigator.vibrate === 'function';
function tryVibrate(pattern) {
  if (supportsVibrate) { try { navigator.vibrate(pattern); } catch {} }
  else { sparkleFallback(); }
}
function sparkleFallback() {
  const el = document.getElementById('haptic-pulse');
  if (!el) return;
  el.classList.remove('active');
  void el.offsetWidth;
  el.classList.add('active');
  setTimeout(() => el.classList.remove('active'), 220);
}

// --- AUDIO ---
const themeAudio = document.getElementById('theme-audio');
let audioCtx = null;

function audioAvailable() {
  return !!themeAudio;
}

function ensureAudioContext() {
  if (!audioCtx && (window.AudioContext || window.webkitAudioContext)) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx?.state === 'suspended') audioCtx.resume().catch(() => {});
  return audioCtx;
}

function setAudioEnabled(enabled) {
  state.audioEnabled = !!enabled;
  localStorage.setItem(AUDIO_KEY, state.audioEnabled ? '1' : '0');
  if (themeAudio) {
    themeAudio.volume = 0.28;
    if (state.audioEnabled && audioAvailable()) {
      themeAudio.play().catch(() => {
        state.audioEnabled = false;
        localStorage.setItem(AUDIO_KEY, '0');
        updateAudioButton();
      });
    } else {
      themeAudio.pause();
    }
  }
  updateAudioButton();
}

function updateAudioButton() {
  const btn = document.getElementById('sound-toggle');
  if (!btn) return;
  // Show what the button WILL DO on press: if audio is playing, show "Lyd av" (will mute); if muted, show "Lyd på" (will unmute)
  btn.textContent = state.audioEnabled ? copy().soundOff : copy().soundOn;
  btn.setAttribute('aria-pressed', state.audioEnabled ? 'true' : 'false');
}

function playTone(notes, type = 'sine', gain = 0.035) {
  if (!state.audioEnabled) return;
  const ac = ensureAudioContext();
  if (!ac) return;
  const now = ac.currentTime;
  notes.forEach(([freq, start, duration]) => {
    const osc = ac.createOscillator();
    const amp = ac.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, now + start);
    amp.gain.setValueAtTime(0.0001, now + start);
    amp.gain.exponentialRampToValueAtTime(gain, now + start + 0.02);
    amp.gain.exponentialRampToValueAtTime(0.0001, now + start + duration);
    osc.connect(amp).connect(ac.destination);
    osc.start(now + start);
    osc.stop(now + start + duration + 0.03);
  });
}

function playUiSound(kind) {
  if (kind === 'badge') playTone([[660,0,0.12],[880,0.09,0.16],[1320,0.22,0.22]], 'triangle', 0.03);
  if (kind === 'card') playTone([[392,0,0.14],[523,0.11,0.18]], 'sine', 0.026);
  if (kind === 'finale') playTone([[523,0,0.18],[659,0.13,0.18],[784,0.26,0.24],[1046,0.44,0.36]], 'triangle', 0.034);
  if (kind === 'tap') playTone([[520,0,0.08]], 'sine', 0.018);
}

// --- CANVAS ---
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');

function fitCanvasToContainer() {
  const wrap = document.querySelector('.canvas-wrap');
  if (!wrap || !canvas) return;

  const rect = wrap.getBoundingClientRect();

  // Keep game-world coordinates at 1200x760. Do not change STOPS or TRAIL.
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
}

// --- CELEBRATIONS ---
function triggerCelebration(stop) {
  for (let i = 0; i < 28; i++) {
    const angle = (Math.PI * 2 / 28) * i + Math.random() * 0.4;
    const speed = 2.2 + Math.random() * 3.4;
    state.particles.push({
      x: stop.x, y: stop.y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1.2,
      life: 1, decay: 0.022 + Math.random() * 0.014,
      color: stop.color, r: 3 + Math.random() * 4, type: stop.theme,
    });
  }
  tryVibrate([30, 40, 30]);
  playUiSound('badge');
}

function showBadgePopup(stopId) {
  const sc = stopCopy(stopId);
  document.getElementById('bp-icon').textContent  = sc.badge;
  document.getElementById('bp-title').textContent = sc.badgeTitle;
  document.getElementById('bp-text').textContent  = sc.badgeUnlockText;
  document.getElementById('bp-close').textContent = copy().mcNextBtn;
  const pop = document.getElementById('badge-pop');
  pop.classList.add('show');
  pop.setAttribute('aria-hidden', 'false');
  const timer = setTimeout(closeBadgePopup, 4500);
  document.getElementById('bp-close').onclick = () => { clearTimeout(timer); closeBadgePopup(); };
}
function closeBadgePopup() {
  const pop = document.getElementById('badge-pop');
  pop.classList.remove('show');
  pop.setAttribute('aria-hidden', 'true');
}

// --- MEMORY CARD ---
function showMemoryCard(stopId) {
  const sc = stopCopy(stopId);
  document.getElementById('mc-badge').textContent  = sc.badge;
  document.getElementById('mc-title').textContent  = sc.title;
  document.getElementById('mc-child').textContent  = sc.childText;
  document.getElementById('mc-family').textContent = sc.familyText;
  document.getElementById('mc-next').textContent   = copy().mcNextBtn;
  document.getElementById('mc-stay').textContent   = copy().mcStayBtn;
  const card = document.getElementById('memory-card');
  card.hidden = false;
  state.memoryCardOpen = true;
  playUiSound('card');
  document.getElementById('mc-next').onclick = closeMemoryCard;
  document.getElementById('mc-stay').onclick = closeMemoryCard;
}
function closeMemoryCard() {
  document.getElementById('memory-card').hidden = true;
  state.memoryCardOpen = false;
  const id = state.activeStopId;
  if (id) showBadgePopup(id);
  if (state.found.size === STOPS.length && !state.finaleShown) {
    setTimeout(showFinale, 1200);
  }
}

// --- FINALE ---
function showFinale() {
  state.finaleShown = true;
  const t = copy();
  document.getElementById('finale-title').textContent   = t.finaleTitle;
  document.getElementById('finale-poem').textContent    = t.finalePoemLine;
  document.getElementById('finale-restart').textContent = t.finaleRestart;
  document.getElementById('finale-stay').textContent    = t.finaleStay;
  document.getElementById('finale-badges').textContent  = STOPS.map(s => s.badge).join('');
  const overlay = document.getElementById('finale-overlay');
  overlay.removeAttribute('aria-hidden');
  overlay.classList.add('show');
  spawnConfetti();
  tryVibrate([60, 40, 60, 40, 120]);
  playUiSound('finale');
}
function hideFinale() {
  const overlay = document.getElementById('finale-overlay');
  overlay.classList.remove('show');
  overlay.setAttribute('aria-hidden', 'true');
}
function spawnConfetti() {
  const layer  = document.getElementById('celebration-layer');
  const colors = ['#ff6e6e','#f0aa42','#62c8de','#e0508a','#9b68cc','#78cc64','#6eb8f2'];
  for (let i = 0; i < 44; i++) {
    const dot = document.createElement('div');
    dot.style.cssText = `
      position:absolute;top:${-8+Math.random()*10}%;left:${Math.random()*100}%;
      width:${5+Math.random()*8}px;height:${5+Math.random()*8}px;
      border-radius:${Math.random()>0.5?'50%':'2px'};
      background:${colors[i%colors.length]};
      animation:confettiFall ${1.2+Math.random()*1.8}s ${Math.random()*0.8}s ease-in forwards;
    `;
    layer.appendChild(dot);
    setTimeout(() => dot.remove(), 3200);
  }
}

// --- STOP UNLOCK ---
function unlockStop(stopId) {
  state.activeStopId = stopId;
  const isNew = !state.found.has(stopId);
  if (isNew) {
    state.found.add(stopId);
    saveProgress();
    triggerCelebration(STOPS.find(s => s.id === stopId));
    updateBadgeShelf();
    showMemoryCard(stopId);
  }
  updateProgressPanel();
  updateStagePanel();
}

// --- RESET ---
function resetGame() {
  state.found.clear();
  state.activeStopId     = null;
  state.memoryCardOpen   = false;
  state.finaleShown      = false;
  state.player.x         = 108;
  state.player.y         = 604;
  state.player.targetX   = null;
  state.player.targetY   = null;
  state.particles        = [];
  state.trailParticles   = [];
  state.lastTrailPos     = { x: 108, y: 604 };
  document.getElementById('memory-card').hidden = true;
  hideFinale();
  closeBadgePopup();
  playUiSound('tap');
  saveProgress();
  updateBadgeShelf();
  updateProgressPanel();
  updateStagePanel();
}

  document.documentElement.lang = state.lang;
  document.title = t.mainTitle + ' \u2014 Mini Pride 2026';
  document.body.classList.toggle('large-type',    !!state.settings.large);

function updateBadgeShelf() {
  const row = document.getElementById('badge-row');
  row.innerHTML = '';
  STOPS.forEach(stop => {
    const sc = stopCopy(stop.id);
    const div  = document.createElement('div'); div.className = 'badge-item';
    const icon = document.createElement('div');
    icon.className = 'badge-icon' + (state.found.has(stop.id) ? ' unlocked' : '');
    icon.textContent = stop.badge;
    icon.setAttribute('title', sc.badgeTitle);
    icon.setAttribute('aria-label', sc.badgeTitle + (state.found.has(stop.id) ? ' (funnet)' : ' (ikke funnet enn\u00e5)'));
    const lbl = document.createElement('div'); lbl.className = 'badge-label';
    lbl.textContent = sc.title.split(' ')[0];
    div.appendChild(icon); div.appendChild(lbl); row.appendChild(div);
  });
}

function updateProgressPanel() {
  const t = copy(), count = state.found.size;
  document.getElementById('progress-count').textContent = count + '/6';
  document.getElementById('progress-note').textContent  = count === 6 ? t.progressDone : t.progressGo;
  document.getElementById('progress-fill').style.width  = ((count / 6) * 100) + '%';
  const target = nextStop();
  document.getElementById('next-stop').textContent = target ? (t.nextPrefix + ': ' + stopCopy(target.id).title) : t.allFound;
}

function updateStagePanel() {
  const t = copy(), active = state.activeStopId ? stopCopy(state.activeStopId) : null, complete = state.found.size === 6;
  document.getElementById('stage-title').textContent = complete ? t.finaleTitle : active ? active.title : t.defaultTitle;
  document.getElementById('stage-text').textContent  = complete ? t.finalePoemLine : active ? active.theme : t.defaultText;
}

// --- DRAWING ---
function drawSky(now) {
  const W = canvas.width, H = canvas.height;
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0,    '#ffecd8');
  sky.addColorStop(0.46, '#fff8ee');
  sky.addColorStop(1,    '#f4ffd8');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);
  // Sun
  ctx.fillStyle = 'rgba(255,190,80,0.16)'; ctx.beginPath(); ctx.arc(W-148, 118, 100, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ffb040'; ctx.beginPath(); ctx.arc(W-148, 118, 50, 0, Math.PI*2); ctx.fill();
  // Clouds
  const ci = state.settings.calm ? 0 : Math.sin(now*0.00017)*10;
  drawCloud(ctx, 172+ci, 118, 80);
  drawCloud(ctx, 442-ci*0.5, 86, 64);
  drawCloud(ctx, 796+ci*0.7, 152, 70);
}

function drawCloud(ctx, x, y, s) {
  ctx.fillStyle = 'rgba(255,255,255,0.76)';
  ctx.beginPath();
  ctx.arc(x, y, s*0.42, Math.PI*0.5, Math.PI*1.5);
  ctx.arc(x+s*0.38, y-s*0.1, s*0.34, Math.PI, Math.PI*2);
  ctx.arc(x+s*0.70, y, s*0.28, Math.PI*1.5, Math.PI*0.5);
  ctx.closePath(); ctx.fill();
}

function drawRainbowArcs() {
  const alpha = state.settings.calm ? 0.55 : 0.60;
  const arcs = [
    { x: 240, y: 340, r: 96,  cols: ['#ff6e6e','#ffb040','#f0e060','#60cc70','#60aaff','#c070ee'] },
    { x: 880, y: 280, r: 72,  cols: ['#ff9090','#ffd06e','#fff090','#90dda0','#90ccff','#d8a0f8'] },
  ];
  arcs.forEach(arc => {
    const n = arc.cols.length;
    for (let i = 0; i < n; i++) {
      ctx.beginPath(); ctx.strokeStyle = arc.cols[n-1-i]; ctx.lineWidth = 5;
      ctx.globalAlpha = alpha * (0.55 - i*0.06);
      ctx.arc(arc.x, arc.y, arc.r - i*6, Math.PI, Math.PI*2); ctx.stroke();
    }
    ctx.globalAlpha = 1;
  });
}

function drawPrideBunting() {
  const flags = [
    { x1: 82,  y1: 380, x2: 280, y2: 360 },
    { x1: 520, y1: 320, x2: 720, y2: 340 },
    { x1: 880, y1: 260, x2: 1060, y2: 240 },
  ];
  const colors = ['#ff6e6e','#ffb040','#f0e060','#60cc70','#60aaff','#c070ee','#ff80a0'];
  flags.forEach(({ x1, y1, x2, y2 }) => {
    ctx.beginPath(); ctx.strokeStyle = 'rgba(60,30,10,0.18)'; ctx.lineWidth = 1;
    ctx.moveTo(x1, y1);
    for (let i = 0; i <= 16; i++) {
      const t = i/16;
      ctx.lineTo(x1+(x2-x1)*t, y1+(y2-y1)*t + Math.sin(t*Math.PI)*12);
    }
    ctx.stroke();
    for (let i = 0; i < 7; i++) {
      const t = i / 6;
      const px = x1 + (x2-x1)*t, py = y1 + (y2-y1)*t + Math.sin(t*Math.PI)*12;
      ctx.beginPath(); ctx.moveTo(px-7, py-10); ctx.lineTo(px+7, py-10); ctx.lineTo(px, py+6); ctx.closePath();
      ctx.fillStyle = colors[i % colors.length]; ctx.globalAlpha = 0.72; ctx.fill();
    }
    ctx.globalAlpha = 1;
  });
}

function drawHills() {
  ctx.fillStyle = '#88d870';
  ctx.beginPath(); ctx.moveTo(0, 560);
  ctx.bezierCurveTo(130,498, 230,484, 380,540);
  ctx.bezierCurveTo(530,594, 650,648, 860,534);
  ctx.bezierCurveTo(984,466, 1104,454, canvas.width,510);
  ctx.lineTo(canvas.width, canvas.height); ctx.lineTo(0, canvas.height); ctx.closePath(); ctx.fill();

  ctx.fillStyle = '#5ab54e';
  ctx.beginPath(); ctx.moveTo(0, 622);
  ctx.bezierCurveTo(154,562, 304,612, 484,654);
  ctx.bezierCurveTo(644,690, 872,666, 1024,604);
  ctx.bezierCurveTo(1112,568, 1168,562, canvas.width,578);
  ctx.lineTo(canvas.width, canvas.height); ctx.lineTo(0, canvas.height); ctx.closePath(); ctx.fill();
}

function drawPond(now) {
  const shimmer = state.settings.calm ? 0 : Math.sin(now*0.0018)*3;
  ctx.fillStyle = 'rgba(108,200,224,0.78)';
  ctx.beginPath(); ctx.ellipse(312, 666, 118+shimmer, 42, -0.08, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.28)';
  ctx.beginPath(); ctx.ellipse(298, 658, 52, 14, -0.1, 0, Math.PI*2); ctx.fill();
}

function drawTrail(now) {
  ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = 22;
  const g = ctx.createLinearGradient(120, 520, 1060, 300);
  g.addColorStop(0,   'rgba(255,110,110,0.88)');
  g.addColorStop(0.3, 'rgba(240,176,64, 0.90)');
  g.addColorStop(0.6, 'rgba(98,200,222, 0.92)');
  g.addColorStop(1,   'rgba(110,184,242,0.94)');
  ctx.strokeStyle = g;
  ctx.beginPath();
  TRAIL.forEach((p, i) => { i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y); });
  ctx.stroke();
  if (!state.settings.calm) {
    ctx.lineWidth = 7; ctx.setLineDash([12, 12]);
    ctx.strokeStyle = 'rgba(255,255,255,' + (0.34 + Math.sin(now*0.004)*0.05) + ')';
    ctx.stroke(); ctx.setLineDash([]);
  }
  TRAIL.forEach((p, i) => {
    if (i % 2 === 0) {
      ctx.fillStyle = ['#ff9090','#ffd080','#a0e890','#90d0ff','#f090d0'][i % 5];
      ctx.globalAlpha = 0.68;
      ctx.beginPath(); ctx.arc(p.x + (i%3-1)*18, p.y + (i%4-2)*12, 4, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
    }
  });
}

function drawGuide() {
  if (!state.settings.guide) return;
  const target = nextStop(); if (!target) return;
  ctx.save();
  ctx.strokeStyle = 'rgba(14,44,53,0.18)'; ctx.lineWidth = 3; ctx.setLineDash([7, 13]);
  ctx.beginPath(); ctx.moveTo(state.player.x, state.player.y); ctx.lineTo(target.x, target.y); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();
}

function drawStops(now) {
  STOPS.forEach((stop, idx) => {
    const found   = state.found.has(stop.id);
    const hovered = state.hoveredStopId === stop.id;
    const pulse   = state.settings.calm ? 0 : (Math.sin(now * 0.004 + idx * 0.9) + 1) * 0.5;
    ctx.save(); ctx.translate(stop.x, stop.y);
    // Glow
    const gr = ctx.createRadialGradient(0,0,stop.radius-20, 0,0,stop.radius+10+pulse*8);
    gr.addColorStop(0, stop.glowColor); gr.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = gr;
    ctx.beginPath(); ctx.arc(0, 0, stop.radius+18+pulse*6, 0, Math.PI*2); ctx.fill();
    // Main circle
    ctx.fillStyle = stop.color;
    ctx.beginPath(); ctx.arc(0, 0, stop.radius-18, 0, Math.PI*2); ctx.fill();
    // Inner highlight
    ctx.fillStyle = 'rgba(255,255,255,0.30)';
    ctx.beginPath(); ctx.arc(-7, -7, 10, 0, Math.PI*2); ctx.fill();
    // Badge emoji
    ctx.font = 'bold ' + (found ? 28 : 22) + 'px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.globalAlpha = found ? 1 : 0.72;
    ctx.fillText(stop.badge, 0, 1); ctx.globalAlpha = 1;
    // Found ring
    if (found) { ctx.strokeStyle = 'rgba(255,255,255,0.88)'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(0, 0, stop.radius-14, 0, Math.PI*2); ctx.stroke(); }
    // Hover ring
    if (hovered) { ctx.strokeStyle = 'rgba(255,255,255,0.50)'; ctx.lineWidth = 2.5; ctx.beginPath(); ctx.arc(0, 0, stop.radius+2, 0, Math.PI*2); ctx.stroke(); }
    ctx.restore();
    // Label
    ctx.fillStyle = 'rgba(14,44,53,0.82)';
    ctx.font = 'bold 14px "IBM Plex Sans",system-ui,sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText(stopCopy(stop.id).title, stop.x, stop.y + stop.radius + 8);
  });
}

function drawTrees() {
  [[82,520,0.9],[148,468,1],[422,430,0.88],[692,456,0.95],[872,350,0.82],[1122,250,0.80]].forEach(([tx,ty,sc]) => {
    ctx.fillStyle = '#7a5038'; ctx.fillRect(tx-6*sc, ty, 12*sc, 52*sc);
    ctx.fillStyle = '#52aa60';
    ctx.beginPath();
    ctx.arc(tx, ty-8*sc, 32*sc, 0, Math.PI*2);
    ctx.arc(tx-22*sc, ty+6*sc, 22*sc, 0, Math.PI*2);
    ctx.arc(tx+22*sc, ty+6*sc, 22*sc, 0, Math.PI*2);
    ctx.fill();
    if (sc > 0.88) {
      ctx.fillStyle = 'rgba(255,160,180,0.72)';
      for (let b = 0; b < 5; b++) {
        ctx.beginPath(); ctx.arc(tx+Math.cos(b*1.26)*18*sc, ty-8*sc+Math.sin(b*1.26)*14*sc, 4*sc, 0, Math.PI*2); ctx.fill();
      }
    }
  });
}

function drawSparkles(now) {
  if (state.settings.calm) return;
  for (let i = 0; i < 24; i++) {
    const bx = 92  + ((i*89)  % 1016);
    const by = 162 + ((i*61)  % 418);
    const dx = Math.sin(now*0.0009 + i) * 8;
    const dy = Math.cos(now*0.0011 + i*0.4) * 6;
    const r  = 2 + (Math.sin(now*0.004 + i) + 1) * 1.5;
    ctx.fillStyle = ['rgba(255,176,64,0.85)','rgba(98,210,234,0.85)','rgba(224,80,138,0.82)','rgba(155,104,204,0.78)'][i%4];
    ctx.beginPath(); ctx.arc(bx+dx, by+dy, r, 0, Math.PI*2); ctx.fill();
  }
}

function drawParticles() {
  state.particles = state.particles.filter(p => p.life > 0);
  state.particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.life -= p.decay;
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawTrailParticles() {
  if (state.settings.calm) return;
  const px = state.player.x, py = state.player.y;
  const dx = px - state.lastTrailPos.x, dy = py - state.lastTrailPos.y;
  if (Math.hypot(dx,dy) > 3) {
    const stop = nextStop();
    const col = stop ? stop.color : '#ffb040';
    for (let t = 0; t < 2; t++) {
      state.trailParticles.push({
        x: px+(Math.random()-0.5)*8, y: py+(Math.random()-0.5)*8,
        vx: -dx*0.18+(Math.random()-0.5)*0.6, vy: -dy*0.18+(Math.random()-0.5)*0.6-0.4,
        life: 1, decay: 0.04, color: col, r: 2+Math.random()*2.4,
      });
    }
    state.lastTrailPos = { x: px, y: py };
  }
  state.trailParticles = state.trailParticles.filter(p => p.life > 0);
  state.trailParticles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.life -= p.decay;
    ctx.globalAlpha = Math.max(0, p.life * 0.7);
    ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.arcTo(x+w,y, x+w,y+h, r); ctx.arcTo(x+w,y+h, x,y+h, r);
  ctx.arcTo(x,y+h, x,y, r); ctx.arcTo(x,y, x+w,y, r); ctx.closePath();
}

function drawUnicorn(now) {
  const bob = state.settings.calm ? 0 : Math.sin(now * 0.005) * 3.5;
  ctx.save();
  ctx.translate(state.player.x, state.player.y + bob);
  // Tail
  const target = nextStop();
  const tailCols = target
    ? ['#ff6e6e','#ffb040','#60cc70','#60aaff','#c070ee',target.color]
    : ['#ff9090','#ffd090','#90dd90','#90ccff','#d090ff','#ffb0d0'];
  for (let ti = 0; ti < 4; ti++) {
    ctx.strokeStyle = tailCols[ti % tailCols.length]; ctx.lineWidth = 9 - ti*1.8; ctx.lineCap = 'round';
    ctx.globalAlpha = 0.72 - ti*0.14;
    ctx.beginPath(); ctx.moveTo(-44-ti*4, 6+ti*2);
    ctx.bezierCurveTo(-68-ti*6, 14+ti*3, -86-ti*6, 4+ti*2, -106-ti*8, 18+ti*4); ctx.stroke();
  }
  ctx.globalAlpha = 1;
  // Body
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.ellipse(0, 0, 37, 25, -0.06, 0, Math.PI*2); ctx.fill();
  // Head
  ctx.beginPath(); ctx.ellipse(33, -17, 20, 16, 0.1, 0, Math.PI*2); ctx.fill();
  // Mane
  ['#ff6e6e','#ffb040','#f0e060','#60cc70','#60aaff','#c070ee'].forEach((mc, mi) => {
    ctx.strokeStyle = mc; ctx.lineWidth = 6-mi*0.5; ctx.globalAlpha = 0.88-mi*0.08;
    ctx.beginPath(); ctx.moveTo(-8+mi*1.5, -17-mi*0.5);
    ctx.bezierCurveTo(2+mi*1.5, -46-mi*0.5, 24, -47, 32-mi*0.5, -19+mi*0.5); ctx.stroke();
  });
  ctx.globalAlpha = 1;
  // Horn
  const hornGlow = state.settings.calm ? 0.4 : 0.4+(Math.sin(now*0.006)+1)*0.25;
  ctx.strokeStyle = '#f0c040'; ctx.lineWidth = 9; ctx.lineCap = 'round'; ctx.globalAlpha = hornGlow;
  ctx.beginPath(); ctx.moveTo(34, -40); ctx.lineTo(47, -14); ctx.stroke();
  ctx.lineWidth = 5; ctx.strokeStyle = '#fff8d0';
  ctx.beginPath(); ctx.moveTo(36, -38); ctx.lineTo(46, -15); ctx.stroke();
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#ffd050'; ctx.beginPath(); ctx.moveTo(34,-42); ctx.lineTo(47,-13); ctx.lineTo(30,-18); ctx.closePath(); ctx.fill();
  // Eye
  ctx.fillStyle = '#1a3040'; ctx.beginPath(); ctx.arc(41,-18, 3.2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(42.4,-19.2, 1, 0, Math.PI*2); ctx.fill();
  // CDN visor
  ctx.fillStyle = '#60d8f0'; ctx.fillRect(-4,-8,17,11);
  ctx.fillStyle = '#0e2c35'; ctx.fillRect(-2,-6,13,7);
  ctx.fillStyle = 'rgba(96,216,240,0.6)'; ctx.fillRect(-2,-6,4,3);
  // Legs
  ctx.strokeStyle = '#dde8ee'; ctx.lineWidth = 6; ctx.lineCap = 'round';
  [[-20,18],[-2,20],[16,18],[30,16]].forEach(([lx,ly]) => {
    ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(lx-2,ly+21); ctx.stroke();
  });
  ctx.restore();
  // Badge count tag. On phones, keep this tiny and away from the route nodes.
  const mobileCanvas = window.innerWidth <= 768 || (window.matchMedia && window.matchMedia('(pointer: coarse)').matches);
  const countText = state.found.size + '/6';
  ctx.font = 'bold 21px "Baloo 2",cursive';
  const tagW = Math.ceil(ctx.measureText(countText).width + (mobileCanvas ? 28 : 30));
  const tagH = mobileCanvas ? 34 : 36;
  const tagX = mobileCanvas ? 68 : 106;
  const tagY = mobileCanvas ? 58 : 62;
  ctx.save(); ctx.translate(tagX, tagY);
  ctx.fillStyle = mobileCanvas ? 'rgba(255,255,255,0.70)' : 'rgba(255,255,255,0.78)';
  roundRect(ctx, -tagW / 2, -tagH / 2, tagW, tagH, mobileCanvas ? 16 : 20); ctx.fill();
  ctx.fillStyle = '#0e2c35'; ctx.textAlign = 'center';
  ctx.fillText(countText, 0, 7);
  ctx.restore();
}

function drawCanvas(now) {
  drawSky(now); drawRainbowArcs(); drawSparkles(now); drawPrideBunting();
  drawHills(); drawPond(now); drawTrail(now); drawGuide(); drawTrees();
  drawStops(now); drawParticles(); drawTrailParticles(); drawUnicorn(now);
}

// --- MOVEMENT ---
function getCanvasPoint(event) {
  const rect = canvas.getBoundingClientRect();
  const cx   = event.clientX ?? (event.touches?.[0]?.clientX ?? rect.left);
  const cy   = event.clientY ?? (event.touches?.[0]?.clientY ?? rect.top);
  return { x: ((cx-rect.left)/rect.width)*canvas.width, y: ((cy-rect.top)/rect.height)*canvas.height };
}

function clampPlayer() {
  state.player.x = Math.max(54, Math.min(canvas.width-54, state.player.x));
  state.player.y = Math.max(90, Math.min(canvas.height-60, state.player.y));
}

function handleCanvasPress(event) {
  if (state.memoryCardOpen) return;
  const pt = getCanvasPoint(event);
  const close = STOPS.find(s => Math.hypot(pt.x-s.x, pt.y-s.y) < s.radius+20);
  if (close) {
    state.player.targetX = close.x; state.player.targetY = close.y;
    if (Math.hypot(state.player.x-close.x, state.player.y-close.y) < close.radius+8) unlockStop(close.id);
  } else {
    state.player.targetX = pt.x; state.player.targetY = pt.y;
  }
  tryVibrate(12);
}

function updateMovement(dt) {
  if (state.memoryCardOpen) return;
  const speed = state.settings.calm ? 140 : 200;
  let dx = 0, dy = 0;
  if (state.keys.has('arrowup')    || state.keys.has('w')) dy -= 1;
  if (state.keys.has('arrowdown')  || state.keys.has('s')) dy += 1;
  if (state.keys.has('arrowleft')  || state.keys.has('a')) dx -= 1;
  if (state.keys.has('arrowright') || state.keys.has('d')) dx += 1;
  if (dx || dy) {
    const len = Math.hypot(dx,dy) || 1;
    state.player.x += (dx/len)*speed*dt; state.player.y += (dy/len)*speed*dt;
    state.player.targetX = null; state.player.targetY = null;
  } else if (state.player.targetX !== null) {
    const tx = state.player.targetX - state.player.x;
    const ty = state.player.targetY - state.player.y;
    const dist = Math.hypot(tx,ty);
    if (dist < 6) { state.player.x = state.player.targetX; state.player.y = state.player.targetY; state.player.targetX = null; state.player.targetY = null; }
    else { state.player.x += (tx/dist)*speed*dt; state.player.y += (ty/dist)*speed*dt; }
  }
  clampPlayer();
}

function updateUnlocks() {
  if (state.memoryCardOpen) return;
  state.hoveredStopId = null;
  STOPS.forEach(stop => {
    const dist = Math.hypot(state.player.x-stop.x, state.player.y-stop.y);
    if (dist < stop.radius+10) { state.hoveredStopId = stop.id; unlockStop(stop.id); }
  });
}

// --- GAME LOOP ---
let lastTime = performance.now();
function frame(now) {
  const dt = Math.min(0.034, (now - lastTime) / 1000);
  lastTime = now;
  updateMovement(dt); updateUnlocks(); drawCanvas(now);
  requestAnimationFrame(frame);
}

// --- EVENTS ---
document.getElementById('lang-toggle').addEventListener('click', () => {
  state.lang = state.lang === 'no' ? 'en' : 'no';
  localStorage.setItem(LANG_KEY, state.lang); syncUi();
});
document.getElementById('sound-toggle').addEventListener('click', () => {
  playUiSound('tap');
  setAudioEnabled(!state.audioEnabled);
});
document.addEventListener('pointerdown', () => {
  if (state.audioEnabled && themeAudio?.paused && audioAvailable()) {
    themeAudio.play().catch(() => {});
  }
}, { once: true });
document.getElementById('reset-btn').addEventListener('click', resetGame);
document.getElementById('finale-restart').addEventListener('click', () => { hideFinale(); resetGame(); });
document.getElementById('finale-stay').addEventListener('click', hideFinale);

const mobileInfoToggle = document.getElementById('mobile-info-toggle');
if (mobileInfoToggle) {
  mobileInfoToggle.addEventListener('click', () => {
    const panel = document.querySelector('.intro-panel');
    if (!panel) return;
    panel.classList.toggle('mobile-collapsed');
    const collapsed = panel.classList.contains('mobile-collapsed');
    mobileInfoToggle.textContent = collapsed ? copy().showInfo : copy().hideInfo;
    mobileInfoToggle.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
    fitCanvasToContainer();
  });
}

[['s-guide','guide'],['s-calm','calm'],['s-large','large'],['s-contrast','contrast'],['s-motion','motion']].forEach(([id,key]) => {
  document.getElementById(id).addEventListener('change', e => { state.settings[key] = e.target.checked; saveSettings(); syncUi(); });
});

canvas.addEventListener('pointerdown', e => { canvas.focus(); handleCanvasPress(e); });
canvas.addEventListener('pointermove', e => {
  const pt = getCanvasPoint(e);
  const hov = STOPS.find(s => Math.hypot(pt.x-s.x, pt.y-s.y) < s.radius+20);
  state.hoveredStopId = hov ? hov.id : null;
});
window.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (['arrowup','arrowdown','arrowleft','arrowright','w','a','s','d'].includes(k)) { e.preventDefault(); state.keys.add(k); }
  if (k === 'escape' && state.memoryCardOpen) closeMemoryCard();
});
window.addEventListener('keyup', e => state.keys.delete(e.key.toLowerCase()));

document.querySelectorAll('.touch-btn[data-dir]').forEach(btn => {
  const map = { up:'arrowup', down:'arrowdown', left:'arrowleft', right:'arrowright' };
  const k = map[btn.dataset.dir];
  const add = () => state.keys.add(k);
  const rem = () => state.keys.delete(k);
  btn.addEventListener('pointerdown',  add);
  btn.addEventListener('pointerup',    rem);
  btn.addEventListener('pointerleave', rem);
  btn.addEventListener('pointercancel',rem);
});

function setAppHeight() {
  document.documentElement.style.setProperty('--app-h', window.innerHeight + 'px');
}

// --- BOOT ---
setAppHeight();
setTimeout(setAppHeight, 300);
if (window.matchMedia('(max-width: 760px)').matches) {
  document.querySelector('.intro-panel')?.classList.add('mobile-collapsed');
}
syncUi();
fitCanvasToContainer();
if (themeAudio) themeAudio.volume = 0.28;
window.addEventListener('resize', () => { setAppHeight(); fitCanvasToContainer(); });
window.addEventListener('orientationchange', () => setTimeout(() => { setAppHeight(); fitCanvasToContainer(); }, 250));
window.addEventListener('pageshow', () => { setAppHeight(); fitCanvasToContainer(); });
requestAnimationFrame(frame);
</script>
</body>
</html>
